name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!(**.md|.gitignore|.gitattributes|.lintstagedrc.json|.zed/**)'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause
          warn-only: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.5.1

      - name: Run Biome CI
        run: biome ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run tests
        run: bun run test

  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, lint, typecheck, test]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref_name == 'main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
          tags: ghcr.io/kenneth-loto/taskforge-api:latest
          cache-from: type=gha,scope=${{ github.base_ref || github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.base_ref || github.ref_name }}

  deploy: 
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, image]
    if: github.ref_name == 'main' && github.event_name == 'push' && needs.changes.outputs.code == 'true'
    steps:
      - name: Trigger Render deploy
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
